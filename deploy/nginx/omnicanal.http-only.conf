# Temporary HTTP-only config (use BEFORE certbot, for initial test)
# After certbot succeeds, switch to omnicanal.storkyproduct.ru.conf

upstream omnicom_web {
    server 127.0.0.1:3000;
}

upstream omnicom_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    listen [::]:80;
    server_name omnicanal.storkyproduct.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~ ^/(auth|conversations|contacts|telegram|users|health)(/|$) {
        proxy_pass http://omnicom_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://omnicom_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://omnicom_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
