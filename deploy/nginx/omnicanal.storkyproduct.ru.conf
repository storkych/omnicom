# Nginx reverse proxy for Omnicom
# Domain: omnicanal.storkyproduct.ru
#
# Install:
#   sudo cp deploy/nginx/omnicanal.storkyproduct.ru.conf /etc/nginx/sites-available/omnicanal
#   sudo ln -sf /etc/nginx/sites-available/omnicanal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS points to this server):
#   sudo certbot --nginx -d omnicanal.storkyproduct.ru

# Upstreams (docker-compose prod binds to localhost only)
upstream omnicom_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream omnicom_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

# Redirect HTTP -> HTTPS (enable after certbot, or use certbot --nginx which adds this)
server {
    listen 80;
    listen [::]:80;
    server_name omnicanal.storkyproduct.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name omnicanal.storkyproduct.ru;

    # Certbot will fill these paths after: certbot --nginx -d omnicanal.storkyproduct.ru
    ssl_certificate     /etc/letsencrypt/live/omnicanal.storkyproduct.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnicanal.storkyproduct.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # --- API routes (NestJS) ---
    location ~ ^/(auth|conversations|contacts|telegram|users|health)(/|$) {
        proxy_pass http://omnicom_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (Socket.IO) ---
    location /socket.io/ {
        proxy_pass http://omnicom_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Next.js frontend ---
    location / {
        proxy_pass http://omnicom_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
